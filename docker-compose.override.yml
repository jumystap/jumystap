services:
    app:
        volumes:
            - ./:/var/www/html
            - ./public:/var/www/html/public
            - /var/www/html/vendor
        environment:
            RUN_MIGRATIONS: 'false'

    nginx:
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
            - ./public:/var/www/html/public:ro
            - storage-data:/var/www/html/storage:ro
