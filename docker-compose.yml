services:
    app:
        build:
            context: .
            target: app
        image: jumystap/app
        restart: unless-stopped
        env_file: .env
        environment:
            DB_HOST: mysql
            DB_PORT: 3306
            RUN_MIGRATIONS: 'true'
        volumes:
            - ./.env:/var/www/html/.env
            - public-data:/var/www/html/public
            - storage-data:/var/www/html/storage
        depends_on:
            mysql:
                condition: service_healthy
        networks:
            - jumystap

    nginx:
        image: nginx:1.27-alpine
        restart: unless-stopped
        ports:
            - '${APP_PORT:-80}:80'
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
            - public-data:/var/www/html/public:ro
            - storage-data:/var/www/html/storage:ro
        depends_on:
            - app
        networks:
            - jumystap

    queue:
        image: jumystap/app
        restart: unless-stopped
        env_file: .env
        environment:
            DB_HOST: mysql
            DB_PORT: 3306
            RUN_MIGRATIONS: 'false'
        command: php artisan queue:work --tries=3 --sleep=3 --max-time=3600
        volumes:
            - ./.env:/var/www/html/.env
            - storage-data:/var/www/html/storage
        depends_on:
            - app
        networks:
            - jumystap

    scheduler:
        image: jumystap/app
        restart: unless-stopped
        env_file: .env
        environment:
            DB_HOST: mysql
            DB_PORT: 3306
            RUN_MIGRATIONS: 'false'
        command: php artisan schedule:work
        volumes:
            - ./.env:/var/www/html/.env
            - storage-data:/var/www/html/storage
        depends_on:
            - app
        networks:
            - jumystap

    mysql:
        image: mysql:8.0
        restart: unless-stopped
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_DATABASE: '${DB_DATABASE:-jumystap}'
            MYSQL_USER: '${DB_USERNAME:-jumystap}'
            MYSQL_PASSWORD: '${DB_PASSWORD:-secret}'
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-secret}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
        volumes:
            - mysql-data:/var/lib/mysql
        networks:
            - jumystap
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
            retries: 5
            timeout: 5s
            interval: 5s

networks:
    jumystap:
        driver: bridge

volumes:
    mysql-data:
        driver: local
    storage-data:
        driver: local
    public-data:
        driver: local
